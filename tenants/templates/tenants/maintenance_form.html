{% extends 'core/base.html' %}

{% block content %}
<div class="container-fluid py-4 d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="width: 100%; max-width: 600px;">
        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
            <h5 class="fw-bold text-dark">Report an Issue</h5>
            <small class="text-muted">Room: {{ profile.room.name }}</small>
        </div>
        <div class="card-body px-5 py-4">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success border-0 py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold small">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                <div class="d-flex justify-content-end mt-4 pt-3 border-top">
                    <a href="{% url 'tenant_portal' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary shadow-sm px-4">Submit Ticket</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
