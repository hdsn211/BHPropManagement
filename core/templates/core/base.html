<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Boarding House Manager{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* BACKGROUND */
        .main-content {
            min-height: 100vh;
            background-color: #f4f6f9;
            padding: 1.5rem !important;
        }

        /* Premium Sidebar  */
        .sidebar-bg {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        
        .sidebar-link {
            color: #94a3b8;
            border-radius: 10px;
            padding: 11px 15px;
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .sidebar-link:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
            transform: translateX(4px);
        }
        .sidebar-link.active {
            background-color: #3b82f6;
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        /* GLASSMORPHISM CLASS */
        .glass-card {
            background: rgba(255, 255, 255, 0.45); /* Semi-transparent white */
            backdrop-filter: blur(12px); /* The frosted glass blur */
            -webkit-backdrop-filter: blur(12px); /* For Safari support */
            border: 1px solid rgba(255, 255, 255, 0.5); /* Subtle bright edge */
            border-radius: 16px !important;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); /* Soft deep shadow */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Make glass cards float up when hovered */
        .glass-card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }

        /* Standard solid white cards */
        .solid-card {
            background: #ffffff;
            border-radius: 16px !important;
            border: 1px solid rgba(0,0,0,0.03) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important;
        }

        /* Table styling */
        .table {
            font-size: 0.875rem;
        }
        .table thead th {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            border-bottom-width: 1px;
        }
    </style>
</head>
<body>

    <!-- THE BULLETPROOF GRID LAYOUT -->
    <div class="container-fluid p-0 m-0">
        <div class="row g-0 m-0">
            
            <!-- LEFT: SIDEBAR -->
            <div class="col-2 d-none d-lg-block p-0 sidebar-bg">
                <div class="d-flex flex-column p-3 pt-4" style="min-height: 100vh;">
                    <!-- Logo -->
                    <div class="d-flex align-items-center mb-5 px-2">
                        <i class="fas fa-building text-primary fa-2x me-3"></i>
                        <span class="fw-bold text-white fs-5">BHManager</span>
                    </div>

                    <!-- Nav Links -->
                    <ul class="nav nav-pills flex-column gap-2 flex-grow-1">
                        <li class="nav-item">
                            <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                                <i class="fas fa-chart-pie me-3"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{% url 'room_list' %}" class="sidebar-link {% if request.resolver_match.url_name == 'room_list' %}active{% endif %}">
                                <i class="fas fa-door-open me-3"></i> Rooms
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="{% url 'tenant_list' %}" class="sidebar-link {% if request.resolver_match.url_name == 'tenant_list' %}active{% endif %}">
                                <i class="fas fa-users me-3"></i> Tenants
                            </a>
                        </li>
                    <li class="nav-item">
                        <a href="{% url 'payment_list' %}" class="nav-link sidebar-link {% if request.resolver_match.url_name == 'payment_list' %}active{% endif %}">
                            <i class="fas fa-money-bill-wave me-3"></i> Payments
                        </a>
                    </li>
                <!-- NEW INQUIRIES LINK -->
                <li class="nav-item">
                    <a href="{% url 'inquiry_list' %}" class="nav-link sidebar-link {% if request.resolver_match.url_name == 'inquiry_list' %}active{% endif %}">
                        <i class="fas fa-envelope-open-text me-3"></i> Inquiries
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'maintenance_list' %}" class="nav-link sidebar-link {% if request.resolver_match.url_name == 'maintenance_list' %}active{% endif %}">
                        <i class="fas fa-wrench me-3"></i> Maintenance
                    </a>
                </li>
                    </ul>

                    <!-- User Profile & Logout -->
                    <div class="border-top border-secondary pt-3 mt-3 px-2">
                        <p class="text-muted small mb-1">Logged in as</p>
                        <p class="text-white fw-semibold mb-3">{{ user.username }}</p>
                        
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-light w-100 btn-sm">
                                <i class="fas fa-sign-out-alt me-2"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- RIGHT: MAIN CONTENT AREA -->
            <div class="col-12 col-lg-10 main-content p-3 p-lg-4">
                <div class="d-lg-none bg-white shadow-sm rounded p-3 mb-4 d-flex justify-content-between align-items-center">
                    <a class="text-dark fw-bold text-decoration-none" href="{% url 'dashboard' %}">
                        <i class="fas fa-building me-2 text-primary"></i>PropManager
                    </a>
                    <div class="dropdown">
                        <button class="btn btn-dark btn-sm" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-bars"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="{% url 'dashboard' %}">Dashboard</a></li>
                            <li><a class="dropdown-item" href="{% url 'room_list' %}">Rooms</a></li>
                            <li><a class="dropdown-item" href="{% url 'tenant_list' %}">Tenants</a></li>
                            <li><a class="dropdown-item" href="{% url 'payment_list' %}">Payments</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form action="{% url 'logout' %}" method="post">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
