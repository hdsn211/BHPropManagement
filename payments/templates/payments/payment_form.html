{% extends 'core/base.html' %}

{% block content %}

<div class="container-fluid py-4 d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="width: 100%; max-width: 600px;">
        
        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
            <h5 class="fw-bold text-dark">Payment</h5> 
            <small class="text-muted">Fill out the information below</small>
        </div>

        <div class="card-body px-5 py-4">
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label text-muted fw-semibold small">
                            {{ field.label }}
                        </label>
                        {{ field }}
                        
                        <!-- Displays form errors -->
                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {% for error in field.errors %}{{ error }}{% endfor %}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}

                <!-- Action Buttons -->
                <div class="d-flex justify-content-end mt-4 pt-3 border-top">
                    <a href="{% url 'room_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary shadow-sm px-4">
                        <i class="fas fa-check me-1"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
