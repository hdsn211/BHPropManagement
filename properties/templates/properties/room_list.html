{% extends 'core/base.html' %}

{% block content %}

<div class="container-fluid py-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-dark mb-0">Manage Rooms</h4>
        <a href="{% url 'add_room' %}" class="btn btn-primary btn-sm shadow-sm">
            <i class="fas fa-plus me-1"></i> Add Room
        </a>
    </div>

    <div class="card border-0 shadow-sm card-hover">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Room Name</th>
                        <th>Rent Amount</th>
                        <th>Status</th>
                        <th class="pe-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for room in rooms %}
                    <tr>
                        <td class="ps-4 fw-semibold">
                            <div class="d-flex align-items-center">
                                {% if room.image %}
                                    <img src="{{ room.image.url }}" alt="{{ room.name }}" class="rounded me-3" style="width: 40px; height: 40px; object-fit: cover;">
                                {% else %}
                                    <div class="rounded bg-light border me-3 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                                        <i class="fas fa-image text-muted"></i>
                                    </div>
                                {% endif %}
                                {{ room.name }}
                            </div>
                        </td>
                        <td class="pe-4 text-center">
                            <a href="{% url 'room_detail' room.id %}" class="btn btn-sm btn-outline-primary me-1" title="View Profile">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a href="{% url 'edit_room' room.id %}" class="btn btn-sm btn-outline-warning me-1" title="Edit">
                                <i class="fas fa-pen-to-square"></i>
                            </a>
                            <a href="{% url 'delete_room' room.id %}" class="btn btn-sm btn-outline-danger" title="Delete" onclick="return confirm('Are you sure you want to delete this room?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-5">
                            <i class="fas fa-building fa-2x mb-2 d-block opacity-50"></i>
                            No rooms added yet.
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

{% endblock %}
